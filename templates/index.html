<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCrop</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <h1>🌾 OptiCrop</h1>

    <p class="subtitle">
        Smart Agricultural Production Optimization Engine
    </p>

    <form action="/predict" method="POST">

        <div class="grid">

            <div class="input-box">
                <label>Nitrogen (N)</label>
                <input type="number" name="N" required>
            </div>

            <div class="input-box">
                <label>Phosphorus (P)</label>
                <input type="number" name="P" required>
            </div>

            <div class="input-box">
                <label>Potassium (K)</label>
                <input type="number" name="K" required>
            </div>

            <div class="input-box">
                <label>Temperature (°C)</label>
                <input type="number" step="0.01" name="temperature" required>
            </div>

            <div class="input-box">
                <label>Humidity (%)</label>
                <input type="number" step="0.01" name="humidity" required>
            </div>

            <div class="input-box">
                <label>Soil pH</label>
                <input type="number" step="0.01" name="ph" required>
            </div>

            <div class="input-box">
                <label>Rainfall (mm)</label>
                <input type="number" step="0.01" name="rainfall" required>
            </div>

        </div>

        <button type="submit">
            Predict Crop
        </button>

    </form>

</div>

</body>
</html>
